<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membrane Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD2YM6XeKdw0GU4GIiHTFNPWmPrC9-Fki4",
            authDomain: "membrane-project.firebaseapp.com",
            projectId: "membrane-project",
            storageBucket: "membrane-project.firebasestorage.app",
            messagingSenderId: "377784934011",
            appId: "1:377784934011:web:5220f5257a9839929e4cde",
            measurementId: "G-SNVMMDPR6M"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global exposing for existing logic
        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
        window.dbGet = get;
    </script>

    <style>
        :root {
            --primary: #1a2a3a;
            --secondary: #2c3e50;
            --accent: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --white: #ffffff;
            --gray: #95a5a6;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--light); color: var(--secondary); }
        
        /* Auth UI */
        #loginScreen {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            z-index: 2000; align-items: center; justify-content: center;
        }
        .auth-box { 
            background: var(--white); padding: 40px; border-radius: 15px; 
            width: 350px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }
        .auth-box h2 { margin-bottom: 25px; color: var(--primary); font-weight: 700; }
        
        /* Layout */
        #mainContent { display: none; }
        .header { 
            background: var(--primary); color: var(--white); padding: 20px; 
            text-align: center; position: relative; box-shadow: var(--shadow);
        }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        .logout-btn { 
            position: absolute; right: 20px; top: 18px; background: var(--danger); 
            padding: 8px 15px; font-size: 12px; border:none; border-radius:6px; 
            color:white; cursor:pointer; font-weight: bold; transition: 0.3s;
        }
        .logout-btn:hover { background: #c0392b; }

        /* Navigation */
        .tab-container { 
            display: flex; background: var(--white); position: sticky; top: 0; 
            z-index: 1000; overflow-x: auto; border-bottom: 1px solid #ddd;
        }
        .tab-btn { 
            flex: 1; padding: 16px; border: none; color: var(--gray); background: none; 
            cursor: pointer; font-weight: 600; min-width: 110px; transition: 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: #f0f7ff; }

        /* Content Areas */
        .content-section { display: none; padding: 25px; max-width: 1100px; margin: auto; animation: fadeIn 0.4s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--white); padding: 25px; border-radius: 12px; 
            box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.05);
        }
        h2 { color: var(--primary); font-size: 1.3rem; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; }
        h2::before { content: ''; width: 4px; height: 18px; background: var(--accent); margin-right: 10px; border-radius: 2px; }

        /* Tables */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--white); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fdfdfd; color: var(--primary); font-weight: 600; font-size: 14px; text-transform: uppercase; }
        tr:hover { background: #fcfcfc; }

        /* Forms */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: var(--secondary); }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            box-sizing: border-box; transition: 0.3s; font-size: 14px;
        }
        input:focus, select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); }
        
        /* Buttons */
        button { 
            padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-auth { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
        .btn-auth:hover { background: #2980b9; transform: translateY(-1px); }
        
        .btn-pdf { background: var(--primary); color: white; margin-top: 15px; }
        .btn-pdf:hover { background: #000; }
        
        .type-in { background: #e8f8f0; color: var(--success); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .type-out { background: #fdedec; color: var(--danger); padding: 4px 8px; border-radius: 4px; font-size: 12px; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .tab-btn { padding: 12px 5px; font-size: 12px; }
            .content-section { padding: 15px; }
            .header h1 { font-size: 18px; }
        }
    </style>
</head>
<body onload="waitForFirebase()">

<div id="loginScreen">
    <div class="auth-box" id="loginForm">
        <h2>Membrane Login</h2>
        <div class="form-group"><input type="text" id="userLogin" placeholder="Username"></div>
        <div class="form-group"><input type="password" id="passLogin" placeholder="Password"></div>
        <button class="btn-auth" onclick="handleAuth('LOGIN')">Login to System</button>
        <span class="toggle-link" style="color:var(--accent); cursor:pointer; display:block; margin-top:15px; font-size:14px;" onclick="toggleAuth(true)">Need an account? Request Access</span>
    </div>

    <div class="auth-box" id="regForm" style="display: none;">
        <h2>Register</h2>
        <div class="form-group"><input type="text" id="userReg" placeholder="Choose Username"></div>
        <div class="form-group"><input type="password" id="passReg" placeholder="Choose Password"></div>
        <button class="btn-auth" onclick="handleAuth('REGISTER')">Request Access</button>
        <span class="toggle-link" style="color:var(--accent); cursor:pointer; display:block; margin-top:15px; font-size:14px;" onclick="toggleAuth(false)">Back to Login</span>
    </div>
</div>

<div id="mainContent">
    <div class="header">
        <h1>Membrane Management System</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="openTab('home')">Home</button>
        <button class="tab-btn" onclick="openTab('inventory')">Inventory</button>
        <button class="tab-btn" onclick="openTab('fg_packaging')">Entry</button>
        <button class="tab-btn" onclick="openTab('history')">History</button>
        <button class="tab-btn" id="adminTabBtn" style="display:none;" onclick="openTab('admin_panel')">Admin</button>
        <button class="tab-btn" onclick="openTab('add_product')">Settings</button>
    </div>

    <div id="home" class="content-section active">
        <div class="card">
            <h2>Welcome Back</h2>
            <p style="color: var(--gray); line-height: 1.6;"</p>
        </div>
    </div>

    <div id="inventory" class="content-section">
        <div class="card">
            <h2>Live Inventory Status</h2>
            <div class="table-responsive">
                <table id="dynamicStockTable">
                    <thead><tr><th>Category</th><th>Product Model</th><th>In Stock</th></tr></thead>
                    <tbody id="inventoryBody"></tbody>
                </table>
            </div>
            <button class="btn-pdf" onclick="downloadPDF('dynamicStockTable', 'Stock_Report')">Generate PDF Report</button>
        </div>
    </div>

    <div id="fg_packaging" class="content-section">
        <div class="card" style="max-width: 500px; margin: auto;">
            <h2>Stock Transaction</h2>
            <div class="form-group"><label>Category</label><select id="entryCat" onchange="updateEntryModels()"></select></div>
            <div class="form-group"><label>Product Name</label><select id="entryModel"></select></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="entryQty" value="0"></div>
            <div style="display:flex; gap:15px; margin-top:20px;">
                <button style="background:var(--success); color:white; flex:1" onclick="processStock('IN')">Stock IN</button>
                <button style="background:var(--danger); color:white; flex:1" onclick="processStock('OUT')">Stock OUT</button>
            </div>
        </div>
    </div>

    <div id="history" class="content-section">
        <div class="card">
            <h2>Transaction Records</h2>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:15px; margin-bottom:20px; background:#f9f9f9; padding:15px; border-radius:10px;">
                <input type="text" id="filterName" placeholder="Search product..." oninput="applyFilters()">
                <input type="date" id="filterFrom" onchange="applyFilters()">
                <input type="date" id="filterTo" onchange="applyFilters()">
            </div>
            <div class="table-responsive">
                <table id="historyTable">
                    <thead><tr><th>Date & Time</th><th>Product</th><th>Type</th><th>Qty</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
            <button class="btn-pdf" onclick="downloadPDF('historyTable', 'Transaction_History')">Export History (PDF)</button>
        </div>
    </div>

    <div id="admin_panel" class="content-section">
        <div class="card">
            <h2>Access Control</h2>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>User</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="userListBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="add_product" class="content-section">
        <div class="card" style="max-width: 500px; margin: auto;">
            <h2>Configuration</h2>
            <div class="form-group"><label>Select Category</label><select id="newProdCat"></select></div>
            <div class="form-group"><label>New Model Name</label><input type="text" id="newProdName" placeholder="Type name here..."></div>
            <button class="btn-auth" onclick="addNewProduct()">Save New Product</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_USER = "Sazzad Hossain";
    const ADMIN_PASS = "866199";

    const DEFAULT_DATA = {
        categories: {
            "Industrial": ["BW 4040", "BW 4040 LP", "BW 8040", "BW FR 8040"],
            "Household": ["75 GPD", "100 GPD", "125 GPD"],
            "Raw Material": ["Outer Pipe/Tube"]
        },
        stocks: {
            "BW 4040": 0, "BW 4040 LP": 0, "BW 8040": 0, "BW FR 8040": 0,
            "75 GPD": 0, "100 GPD": 0, "125 GPD": 0, "Outer Pipe/Tube": 0
        },
        history: []
    };

    let SYSTEM = {
        users: { "Sazzad Hossain": { pass: "866199", status: "active", role: "admin" } },
        data: DEFAULT_DATA,
        async save() {
            if (window.db) {
                await window.dbSet(window.dbRef(window.db, 'membrane_system/users'), this.users);
                await window.dbSet(window.dbRef(window.db, 'membrane_system/data'), this.data);
            }
        }
    };

    function waitForFirebase() {
        const check = setInterval(() => {
            if (window.db) {
                clearInterval(check);
                syncWithFirebase();
            }
        }, 500);
    }

    async function syncWithFirebase() {
        const userSnap = await window.dbGet(window.dbRef(window.db, 'membrane_system/users'));
        const dataSnap = await window.dbGet(window.dbRef(window.db, 'membrane_system/data'));

        if (userSnap.exists()) SYSTEM.users = userSnap.val();
        if (dataSnap.exists()) SYSTEM.data = dataSnap.val();
        
        checkPersistentSession();
    }

    function checkPersistentSession() {
        const loggedUser = localStorage.getItem('membrane_logged_user');
        if (loggedUser && SYSTEM.users[loggedUser] && SYSTEM.users[loggedUser].status === 'active') {
            enterMainUI(loggedUser);
        }
    }

    function enterMainUI(username) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        if(username === ADMIN_USER) document.getElementById('adminTabBtn').style.display = 'block';
        initApp();
        
        // Live Listen for Data updates
        window.dbOnValue(window.dbRef(window.db, 'membrane_system/data'), (snapshot) => {
            if (snapshot.exists()) {
                SYSTEM.data = snapshot.val();
                loadStockDisplay();
                applyFilters();
            }
        });
    }

    function handleAuth(mode) {
        if(mode === 'REGISTER') {
            const u = document.getElementById('userReg').value.trim();
            const p = document.getElementById('passReg').value;
            if(!u || !p) return alert("Please fill all fields.");
            if(SYSTEM.users[u]) return alert("Username already exists.");
            SYSTEM.users[u] = { pass: p, status: "pending", role: "user" };
            SYSTEM.save();
            alert("Request submitted! Please wait for Sazzad Hossain to approve.");
            toggleAuth(false);
        } else {
            const u = document.getElementById('userLogin').value;
            const p = document.getElementById('passLogin').value;
            const user = SYSTEM.users[u];
            if(user && user.pass === p) {
                if(user.status !== "active") return alert("Account PENDING. Contact Admin.");
                localStorage.setItem('membrane_logged_user', u);
                enterMainUI(u);
            } else { alert("Invalid Credentials."); }
        }
    }

    function logout() {
        localStorage.removeItem('membrane_logged_user');
        location.reload();
    }

    function initApp() {
        const cats = Object.keys(SYSTEM.data.categories);
        const opts = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('entryCat').innerHTML = opts;
        document.getElementById('newProdCat').innerHTML = opts;
        updateEntryModels();
        loadStockDisplay();
        if(localStorage.getItem('membrane_logged_user') === ADMIN_USER) loadUserList();
    }

    function openTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if (event) event.currentTarget.classList.add('active');
    }

    function updateEntryModels() {
        const cat = document.getElementById('entryCat').value;
        const models = SYSTEM.data.categories[cat] || [];
        document.getElementById('entryModel').innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function loadStockDisplay() {
        let html = "";
        for(let cat in SYSTEM.data.categories) {
            const items = SYSTEM.data.categories[cat];
            items.forEach((item, index) => {
                html += `<tr>${index === 0 ? `<td rowspan="${items.length}"><strong>${cat}</strong></td>` : ''}
                <td>${item}</td><td><strong>${SYSTEM.data.stocks[item] || 0}</strong></td></tr>`;
            });
        }
        document.getElementById('inventoryBody').innerHTML = html;
    }

    function processStock(type) {
        const item = document.getElementById('entryModel').value;
        const qty = parseInt(document.getElementById('entryQty').value);
        if(!item || isNaN(qty) || qty <= 0) return alert("Select a valid product and quantity.");
        if(type === 'OUT' && (SYSTEM.data.stocks[item] || 0) < qty) return alert("Low stock! Cannot proceed.");
        
        SYSTEM.data.stocks[item] = (SYSTEM.data.stocks[item] || 0) + (type === 'IN' ? qty : -qty);
        if(!SYSTEM.data.history) SYSTEM.data.history = [];
        SYSTEM.data.history.unshift({ timestamp: new Date().getTime(), date: new Date().toLocaleString(), item, type, qty });
        SYSTEM.save();
        alert("Transaction Successful!");
        document.getElementById('entryQty').value = 0;
    }

    function applyFilters() {
        if(!SYSTEM.data.history) return;
        const nameF = document.getElementById('filterName').value.toLowerCase();
        const fromD = document.getElementById('filterFrom').value ? new Date(document.getElementById('filterFrom').value).setHours(0,0,0,0) : null;
        const toD = document.getElementById('filterTo').value ? new Date(document.getElementById('filterTo').value).setHours(23,59,59,999) : null;
        const filtered = SYSTEM.data.history.filter(h => (h.item.toLowerCase().includes(nameF)) && (!fromD || h.timestamp >= fromD) && (!toD || h.timestamp <= toD));
        document.getElementById('historyBody').innerHTML = filtered.map(h => `<tr><td>${h.date}</td><td>${h.item}</td><td><span class="${h.type === 'IN' ? 'type-in' : 'type-out'}">${h.type}</span></td><td>${h.qty}</td></tr>`).join('');
    }

    function downloadPDF(tableId, fileName) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("Membrane Management System", 14, 20);
        doc.text("Report: " + new Date().toLocaleString(), 14, 28);
        doc.autoTable({ html: '#' + tableId, startY: 35, theme: 'grid' });
        doc.save(fileName + ".pdf");
    }

    function toggleAuth(showReg) {
        document.getElementById('loginForm').style.display = showReg ? 'none' : 'block';
        document.getElementById('regForm').style.display = showReg ? 'block' : 'none';
    }

    function loadUserList() {
        let html = "";
        for(let u in SYSTEM.users) {
            if(u === ADMIN_USER) continue;
            const user = SYSTEM.users[u];
            html += `<tr><td>${u}</td><td><span style="color:${user.status==='active'?'green':'orange'}">${user.status.toUpperCase()}</span></td>
                <td>${user.status === 'pending' ? `<button style="background:var(--success); color:white; padding:5px 10px; margin-right:5px;" onclick="approve('${u}')">Approve</button>` : ''}
                <button style="background:var(--danger); color:white; padding:5px 10px;" onclick="delU('${u}')">Delete</button></td></tr>`;
        }
        document.getElementById('userListBody').innerHTML = html;
    }
    function approve(u) { SYSTEM.users[u].status = 'active'; SYSTEM.save(); loadUserList(); }
    function delU(u) { if(confirm("Are you sure?")) { delete SYSTEM.users[u]; SYSTEM.save(); loadUserList(); } }

    function addNewProduct() {
        const cat = document.getElementById('newProdCat').value;
        const name = document.getElementById('newProdName').value.trim();
        if(!name || SYSTEM.data.stocks[name] !== undefined) return alert("Invalid Name or Duplicate.");
        SYSTEM.data.categories[cat].push(name);
        SYSTEM.data.stocks[name] = 0;
        SYSTEM.save();
        alert("New Product Added!");
        document.getElementById('newProdName').value = "";
        initApp();
    }
</script>
</body>
</html>
