<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membrane Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD2YM6XeKdw0GU4GIiHTFNPWmPrC9-Fki4",
            authDomain: "membrane-project.firebaseapp.com",
            projectId: "membrane-project",
            storageBucket: "membrane-project.firebasestorage.app",
            messagingSenderId: "377784934011",
            appId: "1:377784934011:web:5220f5257a9839929e4cde",
            measurementId: "G-SNVMMDPR6M"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
        window.dbGet = get;
    </script>

    <style>
        :root {
            --primary: #1a2a3a; --secondary: #2c3e50; --accent: #3498db;
            --success: #2ecc71; --danger: #e74c3c; --light: #f8f9fa;
            --white: #ffffff; --gray: #95a5a6; --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: var(--secondary); }
        #loginScreen { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); z-index: 2000; align-items: center; justify-content: center; }
        .auth-box { background: var(--white); padding: 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #mainContent { display: none; }
        .header { background: var(--primary); color: var(--white); padding: 20px; text-align: center; position: relative; }
        .logout-btn { position: absolute; right: 20px; top: 18px; background: var(--danger); padding: 8px 15px; border:none; border-radius:6px; color:white; cursor:pointer; font-weight: bold; }
        .tab-container { display: flex; background: var(--white); position: sticky; top: 0; z-index: 1000; overflow-x: auto; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 15px; border: none; color: var(--gray); background: none; cursor: pointer; font-weight: 600; min-width: 100px; transition: 0.3s; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: #f0f7ff; }
        .content-section { display: none; padding: 20px; max-width: 1000px; margin: auto; }
        .content-section.active { display: block; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fdfdfd; color: var(--primary); font-size: 14px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-auth { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
        .btn-pdf { background: var(--primary); color: white; margin-top: 15px; }
        .type-in { background: #e8f8f0; color: var(--success); padding: 3px 7px; border-radius: 4px; font-size: 11px; }
        .type-out { background: #fdedec; color: var(--danger); padding: 3px 7px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body onload="waitForFirebase()">

<div id="loginScreen">
    <div class="auth-box" id="loginForm">
        <h2 style="color:var(--primary)">Membrane Login</h2>
        <div class="form-group"><input type="text" id="userLogin" placeholder="Username"></div>
        <div class="form-group"><input type="password" id="passLogin" placeholder="Password"></div>
        <button class="btn-auth" onclick="handleAuth('LOGIN')">Login</button>
        <p style="font-size:13px; margin-top:15px; cursor:pointer; color:var(--accent)" onclick="toggleAuth(true)">Request Access</p>
    </div>
    <div class="auth-box" id="regForm" style="display: none;">
        <h2 style="color:var(--primary)">Register</h2>
        <div class="form-group"><input type="text" id="userReg" placeholder="Username"></div>
        <div class="form-group"><input type="password" id="passReg" placeholder="Password"></div>
        <button class="btn-auth" onclick="handleAuth('REGISTER')">Request</button>
        <p style="font-size:13px; margin-top:15px; cursor:pointer; color:var(--accent)" onclick="toggleAuth(false)">Back to Login</p>
    </div>
</div>

<div id="mainContent">
    <div class="header">
        <h1>Membrane Management System</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="openTab('inventory', event)">Inventory</button>
        <button class="tab-btn" onclick="openTab('fg_packaging', event)">Entry</button>
        <button class="tab-btn" onclick="openTab('history', event)">History</button>
        <button class="tab-btn" id="adminTabBtn" style="display:none;" onclick="openTab('admin_panel', event)">Admin</button>
        <button class="tab-btn" onclick="openTab('add_product', event)">Settings</button>
    </div>

    <div id="inventory" class="content-section active">
        <div class="card">
            <h2>Live Inventory Status</h2>
            <div style="overflow-x:auto;">
                <table id="dynamicStockTable">
                    <thead><tr><th>Category</th><th>Product Model</th><th>In Stock</th></tr></thead>
                    <tbody id="inventoryBody"></tbody>
                </table>
            </div>
            <button class="btn-pdf" onclick="downloadPDF('dynamicStockTable', 'Stock_Report')">Download PDF</button>
        </div>
    </div>

    <div id="fg_packaging" class="content-section">
        <div class="card" style="max-width: 450px; margin: auto;">
            <h2>Stock Transaction</h2>
            <div class="form-group"><label>Category</label><select id="entryCat" onchange="updateEntryModels()"></select></div>
            <div class="form-group"><label>Product Name</label><select id="entryModel"></select></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="entryQty" value="0"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button style="background:var(--success); color:white; flex:1" onclick="processStock('IN')">Stock IN</button>
                <button style="background:var(--danger); color:white; flex:1" onclick="processStock('OUT')">Stock OUT</button>
            </div>
        </div>
    </div>

    <div id="history" class="content-section">
        <div class="card">
            <h2>Transaction Records</h2>
            <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px;">
                <input type="text" id="filterName" placeholder="Search product..." oninput="applyFilters()" style="flex:1; min-width:150px;">
                <input type="date" id="filterFrom" onchange="applyFilters()" style="flex:1;">
                <input type="date" id="filterTo" onchange="applyFilters()" style="flex:1;">
            </div>
            <div style="overflow-x:auto;">
                <table id="historyTable">
                    <thead><tr><th>Date & Time</th><th>Product</th><th>Type</th><th>Qty</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="admin_panel" class="content-section">
        <div class="card">
            <h2>User Management</h2>
            <table><thead><tr><th>User</th><th>Status</th><th>Action</th></tr></thead><tbody id="userListBody"></tbody></table>
        </div>
    </div>

    <div id="add_product" class="content-section">
        <div class="card" style="max-width: 450px; margin: auto;">
            <h2>Add New Product</h2>
            <div class="form-group"><label>Category</label><select id="newProdCat"></select></div>
            <div class="form-group"><label>Product Name</label><input type="text" id="newProdName" placeholder="Enter name..."></div>
            <button class="btn-auth" onclick="addNewProduct()">Add Product</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_USER = "Sazzad Hossain";
    let SYSTEM = { users: {}, data: { categories: {}, stocks: {}, history: [] } };

    async function saveToDB() {
        if (window.db) {
            await window.dbSet(window.dbRef(window.db, 'membrane_system'), SYSTEM);
        }
    }

    function waitForFirebase() {
        let count = 0;
        const interval = setInterval(() => {
            if (window.db) {
                clearInterval(interval);
                syncData();
            }
            if (count++ > 20) clearInterval(interval);
        }, 500);
    }

    function syncData() {
        window.dbOnValue(window.dbRef(window.db, 'membrane_system'), (snapshot) => {
            if (snapshot.exists()) {
                const val = snapshot.val();
                SYSTEM.users = val.users || {};
                SYSTEM.data = val.data || { categories: {}, stocks: {}, history: [] };
                
                // Ensure default structure if missing
                if(!SYSTEM.data.categories) SYSTEM.data.categories = {"Industrial": [], "Household": [], "Raw Material": []};
                if(!SYSTEM.data.stocks) SYSTEM.data.stocks = {};
                
                checkSession();
            }
        });
    }

    function checkSession() {
        const user = localStorage.getItem('membrane_user');
        if (user && SYSTEM.users[user] && SYSTEM.users[user].status === 'active') {
            showMain(user);
        }
    }

    function showMain(user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        if (user === ADMIN_USER) document.getElementById('adminTabBtn').style.display = 'block';
        refreshUI();
    }

    function handleAuth(mode) {
        if (mode === 'REGISTER') {
            const u = document.getElementById('userReg').value.trim();
            const p = document.getElementById('passReg').value;
            if (!u || !p) return alert("Fill all fields");
            SYSTEM.users[u] = { pass: p, status: 'pending' };
            saveToDB();
            alert("Requested! Wait for Admin approval.");
        } else {
            const u = document.getElementById('userLogin').value.trim();
            const p = document.getElementById('passLogin').value;
            const user = SYSTEM.users[u];
            if (user && user.pass === p) {
                if (user.status !== 'active') return alert("Contact Sazzad Hossain for access.");
                localStorage.setItem('membrane_user', u);
                showMain(u);
            } else alert("Wrong credentials");
        }
    }

    function refreshUI() {
        loadStockTable();
        const cats = Object.keys(SYSTEM.data.categories);
        const optHtml = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('entryCat').innerHTML = optHtml;
        document.getElementById('newProdCat').innerHTML = optHtml;
        updateEntryModels();
        applyFilters();
        if(localStorage.getItem('membrane_user') === ADMIN_USER) loadUserAdmin();
    }

    function loadStockTable() {
        let html = "";
        for (let cat in SYSTEM.data.categories) {
            const items = SYSTEM.data.categories[cat] || [];
            items.forEach((item, index) => {
                const qty = SYSTEM.data.stocks[item] || 0;
                html += `<tr>${index === 0 ? `<td rowspan="${items.length}"><strong>${cat}</strong></td>` : ''}
                        <td>${item}</td><td><strong>${qty}</strong></td></tr>`;
            });
        }
        document.getElementById('inventoryBody').innerHTML = html;
    }

    function updateEntryModels() {
        const cat = document.getElementById('entryCat').value;
        const items = SYSTEM.data.categories[cat] || [];
        document.getElementById('entryModel').innerHTML = items.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function processStock(type) {
        const item = document.getElementById('entryModel').value;
        const qty = parseInt(document.getElementById('entryQty').value);
        if (!item || isNaN(qty) || qty <= 0) return alert("Invalid entry");
        if (type === 'OUT' && (SYSTEM.data.stocks[item] || 0) < qty) return alert("Stock too low");

        SYSTEM.data.stocks[item] = (SYSTEM.data.stocks[item] || 0) + (type === 'IN' ? qty : -qty);
        if(!SYSTEM.data.history) SYSTEM.data.history = [];
        SYSTEM.data.history.unshift({ t: Date.now(), dt: new Date().toLocaleString(), item, type, qty });
        saveToDB();
        alert("Success!");
        document.getElementById('entryQty').value = 0;
    }

    function addNewProduct() {
        const cat = document.getElementById('newProdCat').value;
        const name = document.getElementById('newProdName').value.trim();
        if (!name) return alert("Enter product name");
        if (SYSTEM.data.stocks[name] !== undefined) return alert("Already exists");

        if (!SYSTEM.data.categories[cat]) SYSTEM.data.categories[cat] = [];
        SYSTEM.data.categories[cat].push(name);
        SYSTEM.data.stocks[name] = 0;

        saveToDB().then(() => {
            alert("Added!");
            document.getElementById('newProdName').value = "";
            refreshUI();
        });
    }

    function applyFilters() {
        const nameF = document.getElementById('filterName').value.toLowerCase();
        const fDate = document.getElementById('filterFrom').value ? new Date(document.getElementById('filterFrom').value).setHours(0,0,0,0) : null;
        const tDate = document.getElementById('filterTo').value ? new Date(document.getElementById('filterTo').value).setHours(23,59,59,999) : null;
        
        const filtered = (SYSTEM.data.history || []).filter(h => {
            return h.item.toLowerCase().includes(nameF) && (!fDate || h.t >= fDate) && (!tDate || h.t <= tDate);
        });

        document.getElementById('historyBody').innerHTML = filtered.map(h => 
            `<tr><td>${h.dt}</td><td>${h.item}</td><td><span class="${h.type === 'IN' ? 'type-in' : 'type-out'}">${h.type}</span></td><td>${h.qty}</td></tr>`
        ).join('');
    }

    function openTab(id, e) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(e) e.target.classList.add('active');
    }

    function loadUserAdmin() {
        let html = "";
        for(let u in SYSTEM.users) {
            if(u === ADMIN_USER) continue;
            html += `<tr><td>${u}</td><td>${SYSTEM.users[u].status}</td>
                <td><button onclick="approve('${u}')">Approve</button> <button onclick="delU('${u}')">Del</button></td></tr>`;
        }
        document.getElementById('userListBody').innerHTML = html;
    }
    function approve(u) { SYSTEM.users[u].status = 'active'; saveToDB(); }
    function delU(u) { if(confirm("Delete?")) { delete SYSTEM.users[u]; saveToDB(); } }
    function logout() { localStorage.removeItem('membrane_user'); location.reload(); }
    function toggleAuth(reg) { document.getElementById('loginForm').style.display = reg?'none':'block'; document.getElementById('regForm').style.display = reg?'block':'none'; }
    function downloadPDF(tid, name) { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(name, 14, 15); doc.autoTable({ html: '#'+tid, startY: 20 }); doc.save(name+".pdf"); }
</script>
</body>
</html>
